<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liliane – 58 printemps</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

/* ===== FOND CINÉMATIQUE ===== */
.bg {
  position: fixed;
  inset: 0;
  background: url("pochette-liliane.png") center/cover no-repeat;
  filter: blur(30px) brightness(0.35);
  transform: scale(1.2);
  z-index: 0;
}

/* halo lumineux animé */
.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,200,100,0.2), transparent 60%);
  animation: pulse 6s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* ===== CONTENU ===== */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* TITRE */
.title {
  color: white;
  font-size: 28px;
  margin-bottom: 30px;
  text-shadow: 0 5px 20px black;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== DISQUE ===== */
.disc-container {
  position: relative;
}

/* halo lumineux autour du disque */
.disc-glow {
  position: absolute;
  width: 120%;
  height: 120%;
  top: -10%;
  left: -10%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,180,80,0.4), transparent 70%);
  filter: blur(20px);
  opacity: 0;
  transition: opacity 0.5s;
}

/* disque */
.disc {
  width: 520px;
  height: 520px;
  max-width: 80vw;
  max-height: 80vw;
  border-radius: 50%;
  background: url("pochette-disque-liliane.png") center/cover no-repeat;
  box-shadow: 0 0 50px rgba(0,0,0,0.9);
  animation: spin 18s linear infinite;
  animation-play-state: paused;
  position: relative;
  z-index: 2;
}

.disc.play {
  animation-play-state: running;
}

/* trou central */
.disc::after {
  content: "";
  position: absolute;
  width: 18px;
  height: 18px;
  background: black;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* rotation */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* AUDIO */
audio {
  margin-top: 30px;
  width: 320px;
  max-width: 85vw;
  opacity: 0.9;
}

/* activation glow */
.playing .disc-glow {
  opacity: 1;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container" id="container">

  <div class="title">Liliane – 58 printemps</div>

  <div class="disc-container">
    <div class="disc-glow"></div>
    <div class="disc" id="disc"></div>
  </div>

  <audio id="audio" controls>
    <source src="chanson-liliane.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
const audio = document.getElementById("audio");
const disc = document.getElementById("disc");
const container = document.getElementById("container");

audio.addEventListener("play", () => {
  disc.classList.add("play");
  container.classList.add("playing");
});

audio.addEventListener("pause", () => {
  disc.classList.remove("play");
  container.classList.remove("playing");
});

audio.addEventListener("ended", () => {
  disc.classList.remove("play");
  container.classList.remove("playing");
});
</script>

</body>
</html>
