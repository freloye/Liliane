<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Liliane – 58 printemps</title>

  <meta property="og:title" content="Liliane – 58 printemps" />
  <meta property="og:description" content="Une chanson dédiée à Liliane" />
  <meta property="og:image" content="pochette-liliane.png" />
  <meta property="og:type" content="music.song" />

  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Fond flou */
    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('pochette-liliane.png') center/cover no-repeat;
      filter: blur(25px) brightness(0.4);
      transform: scale(1.1);
    }

    /* Conteneur principal */
    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* Disque */
    .disc {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: url('pochette-liliane.png') center/cover no-repeat;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      animation: spin 20s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Bouton */
    .play-btn {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: white;
      cursor: pointer;
    }

    .title {
      position: absolute;
      top: 40px;
      color: white;
      font-size: 22px;
      text-align: center;
      width: 100%;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="background"></div>

  <div class="container">
    <div class="title">Liliane – 58 printemps</div>

    <div class="disc" id="disc"></div>

    <button class="play-btn" onclick="playAudio()">▶ Écouter</button>

    <audio id="audio">
      <source src="chanson-liliane.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const disc = document.getElementById("disc");

    function playAudio() {
      audio.play();
      disc.style.animationPlayState = "running";
    }

    audio.addEventListener("pause", () => {
      disc.style.animationPlayState = "paused";
    });

    audio.addEventListener("play", () => {
      disc.style.animationPlayState = "running";
    });

    // disque arrêté au départ
    disc.style.animationPlayState = "paused";
  </script>

</body>
</html>
