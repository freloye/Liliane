<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liliane – 58 printemps</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* fond flou */
.bg {
  position: fixed;
  inset: 0;
  background: url("pochette-liliane.png") center/cover no-repeat;
  filter: blur(25px) brightness(0.35);
  transform: scale(1.1);
}

/* contenu */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* disque */
.disc {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  background: url("pochette-liliane.png") center/cover no-repeat;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  animation: spin 18s linear infinite;
  animation-play-state: paused;
}

.disc.play {
  animation-play-state: running;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* titre */
.title {
  color: white;
  margin-bottom: 20px;
  font-size: 24px;
}

/* audio */
audio {
  margin-top: 25px;
  width: 300px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <div class="title">Liliane – 58 printemps</div>

  <div class="disc" id="disc"></div>

  <audio id="audio" controls>
    <source src="chanson-liliane.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
const audio = document.getElementById("audio");
const disc = document.getElementById("disc");

audio.addEventListener("play", () => {
  disc.classList.add("play");
});

audio.addEventListener("pause", () => {
  disc.classList.remove("play");
});

audio.addEventListener("ended", () => {
  disc.classList.remove("play");
});
</script>

</body>
</html>
