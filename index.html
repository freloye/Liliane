<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liliane – 58 printemps</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

.bg {
  position: fixed;
  inset: 0;
  background: url("pochette-liliane.png") center/cover no-repeat;
  filter: blur(32px) brightness(0.32);
  transform: scale(1.2);
  z-index: 0;
}

.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(255,190,90,.25), transparent 55%),
    linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.75));
  animation: pulse 6s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: .35; }
  50% { opacity: .85; }
}

.container {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  padding: 25px;
  box-sizing: border-box;
}

.title {
  color: white;
  font-size: 30px;
  text-align: center;
  text-shadow: 0 5px 25px black;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-18px); }
  to { opacity: 1; transform: translateY(0); }
}

.disc-wrap {
  position: relative;
}

.disc-glow {
  position: absolute;
  inset: -12%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,190,80,.45), transparent 70%);
  filter: blur(24px);
  opacity: 0;
  transition: opacity .5s;
}

.disc {
  width: 520px;
  height: 520px;
  max-width: 78vw;
  max-height: 78vw;
  border-radius: 50%;
  background: url("pochette-disque-liliane.png") center/cover no-repeat;
  box-shadow: 0 0 55px rgba(0,0,0,.9);
  border: 2px solid rgba(255,255,255,0.2);
  animation: spin 18s linear infinite;
  animation-play-state: paused;
  position: relative;
  z-index: 2;
  transition: scale .3s ease;
}

.disc.play {
  animation-play-state: running;
  scale: 1.04;
}

.disc::after {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  background: black;
  border: 2px solid rgba(255,255,255,.5);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.playing .disc-glow {
  opacity: 1;
}

audio {
  width: 340px;
  max-width: 85vw;
  opacity: .95;
}

.hint {
  color: rgba(255,255,255,.75);
  font-size: 14px;
  text-align: center;
  text-shadow: 0 3px 12px black;
}

@media (max-width: 700px) {
  .title {
    font-size: 24px;
  }

  .disc {
    width: 360px;
    height: 360px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<main class="container" id="container">

  <div class="title">Liliane – 58 printemps</div>

  <div class="disc-wrap">
    <div class="disc-glow"></div>
    <div class="disc" id="disc"></div>
  </div>

  <audio id="audio" controls preload="metadata">
    <source src="chanson-liliane.mp3" type="audio/mpeg">
    Votre navigateur ne peut pas lire ce fichier audio.
  </audio>

  <div class="hint">Appuie sur lecture pour lancer la chanson.</div>

</main>

<script>
const audio = document.getElementById("audio");
const disc = document.getElementById("disc");
const container = document.getElementById("container");

audio.addEventListener("play", () => {
  disc.classList.add("play");
  container.classList.add("playing");
});

audio.addEventListener("pause", () => {
  disc.classList.remove("play");
  container.classList.remove("playing");
});

audio.addEventListener("ended", () => {
  disc.classList.remove("play");
  container.classList.remove("playing");
});
</script>

</body>
</html>
